[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
pharos_mainnet = "${PHAROS_RPC:-https://rpc.pharos.xyz}"
pharos_testnet = "${PHAROS_TESTNET_RPC:-https://atlantic.dplabs-internal.com}"

[fmt]
line_length = 100
tab_width = 4
quote_style = "double"
